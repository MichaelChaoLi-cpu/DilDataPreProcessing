<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MICS 变量对齐工具</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-left">
      <h1>MICS 变量对齐工具</h1>
    </div>
    <div class="header-right">
      <label for="module-select">模块：</label>
      <select id="module-select">
        <option value="">全部</option>
      </select>
      <input type="text" id="search-box" placeholder="搜索 Ticker / Text…">
    </div>
  </header>

  <div class="main-container">
    <!-- LEFT PANEL: New alignment dictionary -->
    <div class="panel left-panel">
      <div class="panel-header">
        <h2>新变量字典</h2>
        <button id="btn-new-var" class="btn btn-primary">＋ 新建变量</button>
      </div>

      <!-- Inline new-var input (hidden by default) -->
      <div id="new-var-form" class="new-var-form hidden">
        <input type="text" id="new-var-input" placeholder="输入新变量名…">
        <button id="btn-new-var-confirm" class="btn btn-sm btn-primary">确认</button>
        <button id="btn-new-var-cancel" class="btn btn-sm">取消</button>
      </div>

      <div id="left-list" class="left-list"></div>

      <div class="panel-footer">
        <button id="btn-add-mapping" class="btn btn-accent" disabled>← 加入选中变量</button>
        <button id="btn-export" class="btn">↓ 下载 YAML</button>
      </div>
    </div>

    <!-- RIGHT PANEL: Original variables -->
    <div class="panel right-panel">
      <div class="panel-header">
        <h2>原始变量 <span id="total-count" class="total-count"></span></h2>
        <div class="right-actions">
          <span id="selection-count" class="selection-count">已选 0 项</span>
          <button id="btn-translate" class="btn btn-sm" disabled>翻译选中</button>
          <button id="btn-select-all-btn" class="btn btn-sm">全选</button>
          <button id="btn-deselect-all" class="btn btn-sm">取消全选</button>
        </div>
      </div>

      <div class="table-wrapper">
        <table id="var-table">
          <thead>
            <tr>
              <th class="col-check"><input type="checkbox" id="chk-header" title="全选/取消"></th>
              <th class="col-ticker">Ticker</th>
              <th class="col-module">Module</th>
              <th class="col-text">Text</th>
              <th class="col-translation">Translation</th>
              <th class="col-rounds">Rounds</th>
              <th class="col-countries">Countries</th>
            </tr>
          </thead>
          <tbody id="var-tbody"></tbody>
        </table>
        <div id="table-empty" class="table-empty hidden">暂无数据</div>
        <div id="table-loading" class="table-loading">加载中…</div>
      </div>
    </div>
  </div>

  <!-- Toast notifications -->
  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
